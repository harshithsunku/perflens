name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Python package: lint + tests + wheel/sdist + contents check.
  # The wheel is the ONLY server distribution (uvx / pipx / pip install).
  # -------------------------------------------------------------------------
  python-package:
    name: python package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine ruff

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run test suites
        run: |
          python3 test/test_parser_compat.py
          python3 test/test_aggregator_diff.py

      - name: Build wheel + sdist
        run: python -m build

      - name: Check metadata
        run: twine check dist/*

      - name: Verify wheel contents
        run: |
          python3 - <<'EOF'
          import glob, sys, zipfile
          whl = glob.glob('dist/perflens-*-py3-none-any.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          required = ['perflens/server.py', 'perflens/web.py',
                      'perflens/provision.py', 'perflens/cli.py']
          missing = [r for r in required if r not in names]
          ui = [n for n in names if '/ui/' in n]
          for f in ('index.html', 'app.js', 'style.css'):
              if not any(n.endswith(f) for n in ui):
                  missing.append(f'ui/{f}')
          if missing:
              sys.exit(f'wheel is missing: {missing}')
          print(f'wheel OK: {len(names)} files, UI bundled')
          EOF

      - name: Smoke-run the wheel
        run: |
          python -m pip install dist/perflens-*-py3-none-any.whl
          perflens version
          perflens serve --http-port 8080 --port 9999 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf localhost:8080/api/status && break
            sleep 1
          done
          curl -sf localhost:8080/api/status | grep -q '"status":"ok"'
          curl -sf localhost:8080/ | grep -q '<title>PerfLens</title>'
          kill "$SERVER_PID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Prepared-but-disabled PyPI publish. To enable:
  #   1. Create the project on pypi.org and configure Trusted Publishing
  #      (repo: harshithsunku/perflens, workflow: build.yml, env: pypi).
  #   2. Create a GitHub environment named `pypi`.
  #   3. Change `if: false` below to:
  #      if: startsWith(github.ref, 'refs/tags/v')
  # -------------------------------------------------------------------------
  publish-pypi:
    name: publish to PyPI (disabled)
    if: false
    needs: [python-package]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  # -------------------------------------------------------------------------
  # Static addr2line/readelf bundle for `perflens provision` — lets the
  # server do source mapping on machines without binutils (user-space,
  # sha256-verified download into ~/.perflens/bin).
  # -------------------------------------------------------------------------
  build-tools:
    name: tools bundle (${{ matrix.arch }})
    runs-on: ubuntu-latest
    env:
      BINUTILS_VERSION: '2.44'
      BINUTILS_SHA256: 'ce2017e059d63e67ddb9240e9d4ec49c2893605035cd60e92ad53177f4377237'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            host: ''
            cross_pkg: ''
          - arch: aarch64
            host: 'aarch64-linux-gnu'
            cross_pkg: 'gcc-aarch64-linux-gnu'
    steps:
      - name: Install cross-compiler
        if: matrix.cross_pkg != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.cross_pkg }}

      - name: Download binutils source (pinned + verified)
        run: |
          curl -fsSL -o binutils.tar.xz \
            "https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.xz"
          echo "${BINUTILS_SHA256}  binutils.tar.xz" | sha256sum -c -
          tar xf binutils.tar.xz

      - name: Build static addr2line + readelf
        run: |
          mkdir build && cd build
          HOST_FLAG=""
          [ -n "${{ matrix.host }}" ] && HOST_FLAG="--host=${{ matrix.host }}"
          "../binutils-${BINUTILS_VERSION}/configure" $HOST_FLAG \
            --disable-werror --disable-gdb --disable-gdbserver \
            --disable-sim --disable-readline --disable-libdecnumber \
            --disable-gprofng --disable-shared --enable-static --disable-nls
          make -j"$(nproc)" all-binutils
          # libtool needs -all-static for a fully static final link
          rm -f binutils/addr2line binutils/readelf
          make -C binutils LDFLAGS=-all-static addr2line readelf
          STRIP="${{ matrix.host }}-strip"; [ -n "${{ matrix.host }}" ] || STRIP=strip
          "$STRIP" binutils/addr2line binutils/readelf
          file binutils/addr2line binutils/readelf
          file binutils/addr2line | grep -q 'statically linked'
          # Native build: verify the tools actually run
          if [ -z "${{ matrix.host }}" ]; then
            ./binutils/addr2line --version | head -1
            ./binutils/readelf --version | head -1
          fi

      - name: Package bundle
        run: |
          mkdir -p dist
          ASSET="perflens-tools-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "dist/${ASSET}" -C build/binutils addr2line readelf
          (cd dist && sha256sum "${ASSET}" > "${ASSET}.sha256")
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perflens-tools-${{ matrix.arch }}
          path: dist/perflens-tools-*
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Static C agent for all supported device architectures.
  # -------------------------------------------------------------------------
  build-agent-c:
    name: agent-c (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            cross: ''
            cross_pkg: ''
            toolchain_asset: ''
          - arch: aarch64
            cross: 'aarch64-linux-gnu-'
            cross_pkg: 'gcc-aarch64-linux-gnu'
            toolchain_asset: ''
          - arch: aarch64_be
            cross: 'aarch64_be-linux-musl-'
            cross_pkg: ''
            toolchain_asset: 'aarch64_be-linux-musl-cross.tgz'
          - arch: armv7l
            cross: 'arm-linux-gnueabihf-'
            cross_pkg: 'gcc-arm-linux-gnueabihf'
            toolchain_asset: ''
          - arch: armeb
            cross: 'armeb-linux-musleabihf-'
            cross_pkg: ''
            toolchain_asset: 'armeb-linux-musleabihf-cross.tgz'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler (apt)
        if: matrix.cross_pkg != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.cross_pkg }}

      - name: Install cross-compiler (musl toolchain)
        if: matrix.toolchain_asset != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download toolchains \
            --pattern "${{ matrix.toolchain_asset }}" \
            --dir /tmp
          tar xzf "/tmp/${{ matrix.toolchain_asset }}" -C /opt
          TOOLCHAIN_DIR="/opt/$(basename "${{ matrix.toolchain_asset }}" .tgz)"
          echo "${TOOLCHAIN_DIR}/bin" >> "$GITHUB_PATH"
          "${TOOLCHAIN_DIR}/bin/${{ matrix.cross }}gcc" --version | head -1

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build C agent
        shell: bash
        run: |
          cd agent-c
          make CROSS="${{ matrix.cross }}"
          file perflens-agent

      - name: Package
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          # Raw static binary with the stable release-asset name that
          # install-agent.sh and the agent's --update both fetch from
          # releases/latest/download/.
          cp agent-c/perflens-agent "dist/perflens-agent-linux-${{ matrix.arch }}"
          chmod +x "dist/perflens-agent-linux-${{ matrix.arch }}"
          # Versioned tarball for manual downloads.
          PKG_NAME="perflens-agent-c-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "build/${PKG_NAME}"
          cp agent-c/perflens-agent "build/${PKG_NAME}/"
          chmod +x "build/${PKG_NAME}/perflens-agent"
          cp VERSION "build/${PKG_NAME}/VERSION"
          (cd build && tar -czf "../dist/${PKG_NAME}.tar.gz" "${PKG_NAME}")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perflens-agent-c-${{ matrix.arch }}
          path: |
            dist/perflens-agent-c-*.tar.gz
            dist/perflens-agent-linux-*
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Release on tag: agent binaries, tools bundles, wheel + sdist.
  # -------------------------------------------------------------------------
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [python-package, build-agent-c, build-tools]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          # Raw agent binaries (stable names used by install-agent.sh and
          # the agent's --update) + versioned agent tarballs
          find artifacts -name 'perflens-agent-*' -exec cp {} release/ \;
          # Static tools bundles + checksums (used by `perflens provision`)
          find artifacts -name 'perflens-tools-*' -exec cp {} release/ \;
          # Python package (also published to PyPI once enabled)
          find artifacts -path '*python-package*' -name 'perflens-*' \
            -exec cp {} release/ \;
          ls -la release

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Curated highlights from CHANGELOG.md (section matching the
          # current version). Empty string if no entry found.
          CHANGELOG_BODY="$(awk -v v="${VERSION}" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md || true)"
          {
            echo "## PerfLens ${VERSION}"
            if [ -n "${CHANGELOG_BODY}" ]; then
              echo
              echo "### Highlights"
              echo
              echo "${CHANGELOG_BODY}"
            fi
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "# Server (any machine with Python 3.10+; everything user-space):"
            echo "uvx perflens                       # or: pipx install perflens"
            echo "uvx --from ./perflens-${VERSION}-py3-none-any.whl perflens   # from this release"
            echo
            echo "# Agent (on the target device — zero dependencies, no sudo):"
            echo "curl -fsSL https://raw.githubusercontent.com/harshithsunku/perflens/master/install-agent.sh | sh"
            echo '```'
            echo
            echo "### Assets"
            echo
            echo "| Asset | What it is |"
            echo "|-------|------------|"
            for f in release/perflens-*; do
              fname="$(basename "$f")"
              case "$fname" in
                perflens-agent-linux-*)   what="Agent — static binary (stable name; used by install-agent.sh and --update)" ;;
                perflens-agent-c-*)       what="Agent — versioned tarball" ;;
                perflens-tools-*.sha256)  what="Tools bundle checksum" ;;
                perflens-tools-*)         what="Static addr2line+readelf for \`perflens provision\`" ;;
                *.whl)                    what="Server — Python wheel" ;;
                *.tar.gz)                 what="Server — Python sdist" ;;
                *)                        what="other" ;;
              esac
              echo "| ${fname} | ${what} |"
            done
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: release/perflens-*
          fail_on_unmatched_files: true
