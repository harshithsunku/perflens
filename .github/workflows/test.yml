name: test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # pytest suite: parser, aggregator (differential vs device fixtures),
  # source mapper, HTTP API (TestClient + live SSE), provisioning against
  # a fake release server, and the C-agent wire protocol (real binary
  # against a fake framing server with a perf shim). Runs without Node —
  # the static-UI test skips when the frontend isn't built.
  # -------------------------------------------------------------------------
  pytest:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build C agent (needed by the protocol tests)
        run: make -C agent-c

      - name: Install package + test deps
        run: python -m pip install -e '.[dev]'

      - name: Run pytest
        run: python -m pytest tests/ -v -ra

  # -------------------------------------------------------------------------
  # Frontend: typecheck + vitest unit tests + Playwright browser E2E
  # against a real server replaying a device-captured fixture session
  # (frontend/e2e is self-contained — it starts and stops its own server).
  # Also verifies the committed OpenAPI schema hasn't drifted.
  # -------------------------------------------------------------------------
  frontend:
    name: frontend (vitest + playwright e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install server
        run: python -m pip install -e .

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: OpenAPI schema drift check
        run: |
          python tools/export_openapi.py /tmp/openapi.json
          diff -u frontend/openapi.json /tmp/openapi.json

      - name: Unit tests (vitest)
        run: npm --prefix frontend run test

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Install Playwright browser
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run browser E2E (Playwright)
        run: npm --prefix frontend run e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
