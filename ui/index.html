<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfLens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PerfLens</h1>
        <div id="status">
            <span id="status-dot" class="dot disconnected"></span>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <main>
        <!-- Perf Stat Summary Dashboard -->
        <div id="perf-stat-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-samples">0</div>
                <div class="stat-label">Samples</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-ipc">--</div>
                <div class="stat-label">IPC</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-cycles">--</div>
                <div class="stat-label">Cycles</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-instructions">--</div>
                <div class="stat-label">Instructions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-cache-misses">--</div>
                <div class="stat-label">Cache Misses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-branch-misses">--</div>
                <div class="stat-label">Branch Misses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-agent">--</div>
                <div class="stat-label">Agent</div>
            </div>
        </div>

        <!-- Event Type Selector -->
        <div id="event-selector">
            <label>Event: </label>
            <select id="event-select">
                <option value="cycles">cycles</option>
            </select>
        </div>

        <div id="tabs">
            <button class="tab active" data-tab="functions">Functions</button>
            <button class="tab" data-tab="source">Source</button>
            <button class="tab" data-tab="flamegraph">Flame Graph</button>
            <button class="tab" data-tab="sessions">Sessions</button>
        </div>

        <div id="tab-functions" class="tab-content active">
            <table id="function-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Function</th>
                        <th>Module</th>
                        <th>CPU %</th>
                        <th>Samples</th>
                    </tr>
                </thead>
                <tbody id="function-tbody">
                    <tr><td colspan="5" class="empty">Waiting for data...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="tab-source" class="tab-content">
            <div id="source-view">
                <p class="empty">Click a function in the table to view source code.</p>
            </div>
        </div>

        <div id="tab-flamegraph" class="tab-content">
            <div id="flamegraph-container">
                <p class="empty">Waiting for data...</p>
            </div>
        </div>
        <div id="tab-sessions" class="tab-content">
            <div id="sessions-list">
                <p class="empty">Loading sessions...</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
